<!doctype html>
<html lang="fi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Eemeli karkuteillä</title>
<style>
  :root {
    --sky: #bfdcec;
    --paper: #fffaf0;
    --ink: #2b2417;
    --red: #a63a2a;
    --blue: #3a5f8a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    overflow: hidden;
    background: var(--sky);
    font-family: Georgia, "Times New Roman", serif;
    color: var(--ink);
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
  }
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: var(--red);
    color: var(--paper);
    padding: 0.45rem 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.5rem;
    box-shadow: 0 2px 6px rgba(0,0,0,.2);
    z-index: 5;
  }
  header h1 {
    margin: 0;
    font-size: 1.1rem;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  #mute {
    background: var(--paper);
    color: var(--ink);
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    padding: 0.2rem 0.55rem;
    cursor: pointer;
  }
  #game {
    display: block;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>
<header>
  <h1>Eemeli karkuteillä</h1>
  <button id="mute" title="Äänet päälle/pois">🔊</button>
</header>
<canvas id="game"></canvas>
<script>
(() => {
  "use strict";

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  const C = {
    sky: "#bfdcec",
    hill: "#a8c69a",
    field: "#7fae62",
    fieldDark: "#6a9752",
    path: "#c9a87a",
    house: "#a63a2a",      // Kissankulman punamulta
    houseTrim: "#fffaf0",
    fence: "#9a7b52",
    churn: "#8f9aa5",
    pig: "#eeb8b0",
    pigDark: "#d99a90",
    hair: "#e8d27a",       // pellavatukka
    cap: "#2e4a75",        // sininen myssy
    shirt: "#5a82b5",      // sininen takki
    pants: "#3a5f8a",      // siniset housut
    skin: "#f0c9a2",
    dad: "#5a4632",
    dadShirt: "#8a7355",
    dadFace: "#d98a6a",    // punakka naama
    wood: "#b58a55",
    woodDark: "#8a6535",
    idaDress: "#b5453a",
    sauna: "#6f5a42",
    saunaRoof: "#4a3a2a",
    liinaDress: "#5a7a9a",
    liinaApron: "#fffaf0",
    aatuShirt: "#8a9a6a",
    heart: "#d4506a",
    ink: "#2b2417",
    paper: "#fffaf0",
    red: "#a63a2a"
  };

  let W = 0, H = 0, dpr = 1, groundY = 0, unit = 0;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    groundY = H * 0.78;
    unit = H / 480;
  }
  window.addEventListener("resize", resize);
  resize();

  const HS_KEY = "eemeli-ennatys";
  const UKKO_KEY = "eemeli-puu-ukot";
  let highScore = 0, ukot = 0;
  try {
    highScore = Number(localStorage.getItem(HS_KEY)) || 0;
    ukot = Number(localStorage.getItem(UKKO_KEY)) || 0;
  } catch (e) {}

  // Äänet: isän karjaisu puhesynteesillä, jos laite tukee.
  let muted = false;
  const muteBtn = document.getElementById("mute");
  muteBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    muted = !muted;
    muteBtn.textContent = muted ? "🔇" : "🔊";
    if (muted) {
      stopMusic();
      try { window.speechSynthesis && window.speechSynthesis.cancel(); } catch (err) {}
    } else if (state === "run") {
      startMusic();
    }
  });
  // 8-bittinen taustamusiikki Web Audio API:lla (ei ulkoisia tiedostoja).
  // Kanttiaaltomelodia + kolmioaaltobasso + kohinahihat, 32 kahdeksasosan luuppi.
  const music = {
    ctx: null, master: null, noiseBuf: null,
    timer: null, step: 0, nextTime: 0,
    bpm: 148,
    // MIDI-numerot, 0 = tauko. Am–F–C–G, reipas kansansävelmähenkinen kulku.
    lead: [
      76, 0, 79, 81, 79, 76, 74, 76,
      74, 76, 74, 72, 69, 0, 72, 74,
      76, 0, 79, 81, 83, 81, 79, 76,
      72, 74, 71, 74, 72, 0, 69, 0
    ],
    bass: [
      45, 0, 52, 0, 45, 0, 52, 0,
      41, 0, 48, 0, 41, 0, 48, 0,
      48, 0, 55, 0, 48, 0, 55, 0,
      43, 0, 50, 0, 43, 0, 50, 0
    ]
  };
  function midiHz(m) { return 440 * Math.pow(2, (m - 69) / 12); }
  function initAudio() {
    if (music.ctx) return;
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      music.ctx = new AC();
      music.master = music.ctx.createGain();
      music.master.gain.value = 0.16;
      music.master.connect(music.ctx.destination);
      const len = Math.floor(music.ctx.sampleRate * 0.1);
      music.noiseBuf = music.ctx.createBuffer(1, len, music.ctx.sampleRate);
      const d = music.noiseBuf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    } catch (e) {}
  }
  function blip(type, freq, t, dur, vol) {
    const ctx = music.ctx;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g); g.connect(music.master);
    o.start(t); o.stop(t + dur);
  }
  function hat(t) {
    const ctx = music.ctx;
    const s = ctx.createBufferSource();
    s.buffer = music.noiseBuf;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.05, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
    s.connect(g); g.connect(music.master);
    s.start(t); s.stop(t + 0.05);
  }
  function scheduleMusic() {
    const ctx = music.ctx;
    const stepDur = 60 / music.bpm / 2; // kahdeksasosa
    while (music.nextTime < ctx.currentTime + 0.15) {
      const i = music.step;
      if (music.lead[i]) blip("square", midiHz(music.lead[i]), music.nextTime, stepDur * 0.9, 0.28);
      if (music.bass[i]) blip("triangle", midiHz(music.bass[i]), music.nextTime, stepDur * 1.8, 0.5);
      if (i % 2 === 1) hat(music.nextTime);
      music.step = (i + 1) % music.lead.length;
      music.nextTime += stepDur;
    }
  }
  function startMusic() {
    if (muted) return;
    initAudio();
    if (!music.ctx) return;
    try { if (music.ctx.state === "suspended") music.ctx.resume(); } catch (e) {}
    if (music.timer) return;
    music.step = 0;
    music.nextTime = music.ctx.currentTime + 0.05;
    music.timer = setInterval(scheduleMusic, 60);
  }
  function stopMusic() {
    if (music.timer) { clearInterval(music.timer); music.timer = null; }
  }

  // Isän karjaisu puhesynteesillä. Pelkkä lang-koodi ei kaikilla
  // laitteilla riitä, joten etsitään ääniluettelosta oikeasti
  // suomenkielinen ääni (esim. Googlen/Applen suomi-ääni).
  let fiVoice = null;
  function pickFiVoice() {
    try {
      if (!("speechSynthesis" in window)) return;
      const voices = window.speechSynthesis.getVoices() || [];
      fiVoice =
        voices.find((v) => /^fi([-_]|$)/i.test(v.lang) && /google|natural|premium/i.test(v.name)) ||
        voices.find((v) => /^fi([-_]|$)/i.test(v.lang)) ||
        null;
    } catch (e) {}
  }
  pickFiVoice();
  try {
    if ("speechSynthesis" in window) {
      window.speechSynthesis.onvoiceschanged = pickFiVoice;
    }
  } catch (e) {}

  function yellSound() {
    if (muted) return;
    try {
      if (!("speechSynthesis" in window)) return;
      if (!fiVoice) pickFiVoice();
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance("Eeeemeeeliii!");
      u.lang = "fi-FI";
      if (fiVoice) u.voice = fiVoice;
      u.rate = 0.7;
      u.pitch = 0.5;
      u.volume = 1;
      window.speechSynthesis.speak(u);
    } catch (e) {}
  }

  // Pelitila: "start" | "run" | "over"
  let state = "start";
  let speed = 0, distance = 0, meters = 0, guns = 0;
  let obstacles = [], pickups = [], clouds = [], idas = [], saunas = [];
  let spawnGap = 0, pickupGap = 0, idaGap = 0, saunaGap = 0;
  let idaT = 0;            // aikaa jonka Iida vielä viivyttää isää
  let saunaT = 0;          // aikaa jonka isä paheksuu pussailua
  let halkos = [];         // isän heittämät halot
  let throwT = 0;          // aikaa seuraavaan halonheittoon
  let autsT = 0;           // kuinka kauan "Auts!" vielä näkyy
  let gap = 0;             // Eemelin etumatka isään (px)
  let stumbleT = 0;        // törmäyksen jälkeinen suoja-aika
  let yellT = 0;           // aikaa seuraavaan karjaisuun
  let yellShow = 0;        // kuinka kauan puhekupla vielä näkyy
  let caughtByYell = false;
  let lastTime = 0;

  const player = { x: 0, y: 0, vy: 0, w: 0, h: 0, onGround: true, legPhase: 0 };

  function maxGap() { return W * 0.5; }

  function reset() {
    distance = 0; meters = 0; guns = 0;
    speed = Math.min(250 * unit, W * 0.75);
    obstacles = []; pickups = []; idas = [];
    spawnGap = speed * 1.6;
    pickupGap = speed * 2.5;
    idaGap = speed * 8;
    idaT = 0;
    saunas = [];
    saunaGap = speed * 13;
    saunaT = 0;
    halkos = [];
    throwT = 5;
    autsT = 0;
    gap = W * 0.46;
    stumbleT = 0;
    yellT = 4 + Math.random() * 4;
    yellShow = 0;
    player.w = 24 * unit;
    player.h = 40 * unit;
    player.x = W * 0.42;
    player.y = groundY - player.h;
    player.vy = 0;
    player.onGround = true;
    player.legPhase = 0;
    clouds = [];
    for (let i = 0; i < 4; i++) {
      clouds.push({ x: Math.random() * W, y: (0.08 + Math.random() * 0.22) * H, s: (0.5 + Math.random()) * unit });
    }
  }
  reset();

  function jump() {
    if (player.onGround) {
      player.vy = -600 * unit;
      player.onGround = false;
    }
  }

  function pressed(e) {
    if (e && e.cancelable) e.preventDefault();
    if (state === "run") {
      jump();
    } else {
      state = "run";
      reset();
      startMusic();
    }
  }
  canvas.addEventListener("touchstart", pressed, { passive: false });
  canvas.addEventListener("mousedown", pressed);
  window.addEventListener("keydown", (e) => {
    if (e.code === "Space" || e.code === "ArrowUp") pressed(e);
  });

  function spawnObstacle() {
    const r = Math.random();
    let o;
    if (r < 0.45) {
      o = { type: "aita", w: 20 * unit, h: 34 * unit };          // aidanpätkä
    } else if (r < 0.75) {
      o = { type: "tonkka", w: 22 * unit, h: 30 * unit };        // maitotonkka
    } else {
      o = { type: "possu", w: 40 * unit, h: 26 * unit, ph: 0 };  // possu
    }
    o.x = W + o.w;
    obstacles.push(o);
    const minGap = speed * 0.6 + 180 * unit;
    spawnGap = minGap + Math.random() * 280 * unit;
  }

  function spawnPickup() {
    // Pössykkä leijuu joko hyppykorkeudella tai matalalla
    const high = Math.random() < 0.6;
    pickups.push({
      x: W + 30 * unit,
      y: groundY - (high ? 90 + Math.random() * 40 : 45) * unit,
      r: 16 * unit,
      bob: Math.random() * Math.PI * 2
    });
    pickupGap = speed * (1.8 + Math.random() * 2.2);
  }

  function spawnIda() {
    idas.push({ x: W + 30 * unit, ph: Math.random() * Math.PI * 2 });
    idaGap = speed * (9 + Math.random() * 8);
  }

  function throwHalko() {
    // Halko lähtee isän kädestä ja tähtää Eemeliin pienellä hajonnalla,
    // joten osa heitoista menee reilusti ohi.
    const x0 = player.x - gap;
    const y0 = groundY - 46 * unit;
    const t = 0.8 + Math.random() * 0.3;
    const aimX = player.x + player.w * 0.5 + (Math.random() - 0.5) * 110 * unit;
    const aimY = groundY - 18 * unit;
    const g = 1500 * unit;
    halkos.push({
      x: x0, y: y0,
      vx: (aimX - x0) / t,
      vy: (aimY - y0 - 0.5 * g * t * t) / t,
      rot: 0, vrot: 6 + Math.random() * 5,
      hit: false, landed: false
    });
  }

  function spawnSauna() {
    saunas.push({ x: W + 20 * unit, w: 92 * unit, startled: false, ph: Math.random() * Math.PI * 2 });
    saunaGap = speed * (16 + Math.random() * 12);
  }

  function endGame() {
    state = "over";
    stopMusic();
    ukot += 1;
    if (guns > highScore) highScore = guns;
    try {
      localStorage.setItem(HS_KEY, String(highScore));
      localStorage.setItem(UKKO_KEY, String(ukot));
    } catch (e) {}
  }

  function update(dt) {
    if (state !== "run") return;

    speed = Math.min(speed + 7 * unit * dt, W * 1.3);
    distance += speed * dt;
    meters = Math.floor(distance / (30 * unit));

    // Pelaaja
    player.vy += 1500 * unit * dt;
    player.y += player.vy * dt;
    if (player.y >= groundY - player.h) {
      player.y = groundY - player.h;
      player.vy = 0;
      player.onGround = true;
    }
    if (player.onGround) player.legPhase += dt * 14;
    if (stumbleT > 0) stumbleT -= dt;

    // Isä kirii tasaisesti ja karjaisun aikana rynnistää.
    // Kun Iida viivyttää isää, isä jää jälkeen eikä ehdi karjua.
    if (idaT > 0) {
      idaT -= dt;
      gap = Math.min(gap + 22 * unit * dt, maxGap());
    } else {
      let closing = 4.5 * unit;
      if (yellShow > 0) closing += 16 * unit;
      gap -= closing * dt;

      // Karjaisu
      yellT -= dt;
      if (yellT <= 0) {
        yellShow = 2;
        yellT = 6 + Math.random() * 5;
        yellSound();
      }
    }
    if (yellShow > 0) yellShow -= dt;

    // Esteet ja pössykät
    spawnGap -= speed * dt;
    if (spawnGap <= 0) spawnObstacle();
    pickupGap -= speed * dt;
    if (pickupGap <= 0) spawnPickup();

    for (const o of obstacles) {
      o.x -= speed * dt;
      if (o.type === "possu") o.ph += dt * 10;
    }
    obstacles = obstacles.filter((o) => o.x + o.w > -10);
    for (const p of pickups) { p.x -= speed * dt; p.bob += dt * 4; }
    pickups = pickups.filter((p) => p.x + p.r > -10);

    // Sauna, jonka takana Liina ja Aatu pussailevat. Kun Eemeli
    // yllättää heidät, isä pysähtyy paheksumaan ja jää jälkeen.
    saunaGap -= speed * dt;
    if (saunaGap <= 0) spawnSauna();
    for (const s of saunas) {
      s.x -= speed * dt;
      s.ph += dt * 3;
      if (!s.startled && player.x + player.w > s.x + s.w * 0.3) {
        s.startled = true;
        saunaT = 2.4;
      }
    }
    saunas = saunas.filter((s) => s.x + s.w * 1.6 > -10);
    if (saunaT > 0) {
      saunaT -= dt;
      gap = Math.min(gap + 14 * unit * dt, maxGap());
    }

    // Iida odottelee polun varrella; ohi juostessa hän jää viivyttämään isää
    idaGap -= speed * dt;
    if (idaGap <= 0) spawnIda();
    for (const s of idas) { s.x -= speed * dt; s.ph += dt * 6; }
    for (let i = idas.length - 1; i >= 0; i--) {
      if (idas[i].x <= player.x + player.w * 0.5) {
        idas.splice(i, 1);
        idaT = 3.5;
        yellShow = 0;
      }
    }

    // Taustapilvet
    for (const c of clouds) {
      c.x -= speed * 0.1 * dt * c.s;
      if (c.x < -80) { c.x = W + 80; c.y = (0.08 + Math.random() * 0.22) * H; }
    }

    // Isä paiskoo halkoja. Osuma ei hidasta, Eemeli vain älähtää.
    throwT -= dt;
    if (throwT <= 0 && idaT <= 0 && saunaT <= 0) {
      throwHalko();
      throwT = 4.5 + Math.random() * 4;
    }
    if (autsT > 0) autsT -= dt;
    const grav = 1500 * unit;
    for (const hk of halkos) {
      if (hk.landed) {
        hk.x -= speed * dt;
        continue;
      }
      hk.vy += grav * dt;
      hk.x += hk.vx * dt;
      hk.y += hk.vy * dt;
      hk.rot += hk.vrot * dt;
      if (!hk.hit &&
          hk.x > player.x && hk.x < player.x + player.w &&
          hk.y > player.y && hk.y < player.y + player.h) {
        hk.hit = true;
        autsT = 1.1;
        hk.vx = -Math.abs(hk.vx) * 0.35;
        hk.vy = -260 * unit;
      }
      if (hk.y >= groundY - 4 * unit) {
        hk.y = groundY - 4 * unit;
        hk.landed = true;
      }
    }
    halkos = halkos.filter((hk) => hk.x > -30 * unit && hk.x < W + 60 * unit);

    // Törmäys esteeseen: Eemeli kompastuu ja isä pääsee lähemmäs
    if (stumbleT <= 0) {
      const px = player.x + player.w * 0.15, pw = player.w * 0.7;
      const py = player.y + player.h * 0.1, ph = player.h * 0.9;
      for (const o of obstacles) {
        const oy = groundY - o.h;
        if (px < o.x + o.w * 0.85 && px + pw > o.x + o.w * 0.15 && py + ph > oy + o.h * 0.15) {
          stumbleT = 1.2;
          gap -= W * 0.09;
          speed = Math.max(speed * 0.8, 200 * unit);
          break;
        }
      }
    }

    // Pössykän poiminta: Eemeli innostuu ja pinkoo isältä karkuun
    const cx = player.x + player.w / 2, cy = player.y + player.h / 2;
    for (let i = pickups.length - 1; i >= 0; i--) {
      const p = pickups[i];
      const dx = cx - p.x, dy = cy - (p.y + Math.sin(p.bob) * 5 * unit);
      if (dx * dx + dy * dy < (p.r + player.w * 0.5) ** 2) {
        pickups.splice(i, 1);
        guns += 1;
        gap = Math.min(gap + W * 0.09, maxGap());
      }
    }

    if (gap <= player.w * 1.1) endGame();
  }

  function drawBackground() {
    ctx.fillStyle = C.sky;
    ctx.fillRect(0, 0, W, groundY);

    ctx.fillStyle = "rgba(255,255,255,0.85)";
    for (const c of clouds) {
      ctx.beginPath();
      ctx.ellipse(c.x, c.y, 34 * c.s, 12 * c.s, 0, 0, Math.PI * 2);
      ctx.ellipse(c.x + 22 * c.s, c.y + 4 * c.s, 24 * c.s, 10 * c.s, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Loivat pellot ja Kissankulman punainen talo taustalla
    ctx.fillStyle = C.hill;
    ctx.beginPath();
    ctx.moveTo(0, groundY);
    ctx.quadraticCurveTo(W * 0.3, groundY - H * 0.14, W * 0.6, groundY - H * 0.05);
    ctx.quadraticCurveTo(W * 0.85, groundY - H * 0.12, W, groundY - H * 0.03);
    ctx.lineTo(W, groundY);
    ctx.closePath();
    ctx.fill();

    const hx = W * 0.68, hy = groundY - 66 * unit, hw = 72 * unit, hh = 42 * unit;
    ctx.fillStyle = C.house;
    ctx.fillRect(hx, hy + 24 * unit, hw, hh - 24 * unit);
    ctx.beginPath();
    ctx.moveTo(hx - 6 * unit, hy + 24 * unit);
    ctx.lineTo(hx + hw / 2, hy);
    ctx.lineTo(hx + hw + 6 * unit, hy + 24 * unit);
    ctx.closePath();
    ctx.fillStyle = "#7a4a3a";
    ctx.fill();
    ctx.fillStyle = C.houseTrim;
    ctx.fillRect(hx + 10 * unit, hy + 30 * unit, 12 * unit, 10 * unit);
    ctx.fillRect(hx + hw - 22 * unit, hy + 30 * unit, 12 * unit, 10 * unit);

    // Maa: polku ja nurmi
    ctx.fillStyle = C.field;
    ctx.fillRect(0, groundY, W, 6 * unit);
    ctx.fillStyle = C.path;
    ctx.fillRect(0, groundY + 6 * unit, W, H - groundY);
    ctx.fillStyle = C.fieldDark;
    ctx.fillRect(0, groundY + 4 * unit, W, 2 * unit);
  }

  function drawObstacle(o) {
    const y = groundY - o.h;
    if (o.type === "aita") {
      ctx.fillStyle = C.fence;
      ctx.fillRect(o.x + o.w * 0.35, y, o.w * 0.3, o.h);
      ctx.fillRect(o.x - o.w * 0.4, y + o.h * 0.2, o.w * 1.8, o.h * 0.16);
      ctx.fillRect(o.x - o.w * 0.4, y + o.h * 0.6, o.w * 1.8, o.h * 0.16);
    } else if (o.type === "tonkka") {
      ctx.fillStyle = C.churn;
      ctx.beginPath();
      ctx.roundRect(o.x, y + o.h * 0.15, o.w, o.h * 0.85, 4 * unit);
      ctx.fill();
      ctx.fillRect(o.x + o.w * 0.2, y, o.w * 0.6, o.h * 0.2);
      ctx.fillStyle = "#6f7a85";
      ctx.fillRect(o.x, y + o.h * 0.35, o.w, o.h * 0.08);
    } else {
      // Possu
      ctx.fillStyle = C.pig;
      ctx.beginPath();
      ctx.ellipse(o.x + o.w * 0.45, y + o.h * 0.55, o.w * 0.42, o.h * 0.42, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(o.x + o.w * 0.85, y + o.h * 0.4, o.h * 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = C.pigDark;
      ctx.beginPath();
      ctx.ellipse(o.x + o.w * 0.98, y + o.h * 0.42, o.h * 0.12, o.h * 0.1, 0, 0, Math.PI * 2);
      ctx.fill();
      const lp = Math.sin(o.ph) * 3 * unit;
      ctx.strokeStyle = C.pigDark;
      ctx.lineWidth = 3 * unit;
      ctx.beginPath();
      ctx.moveTo(o.x + o.w * 0.3, y + o.h * 0.8);
      ctx.lineTo(o.x + o.w * 0.3 + lp, groundY);
      ctx.moveTo(o.x + o.w * 0.6, y + o.h * 0.8);
      ctx.lineTo(o.x + o.w * 0.6 - lp, groundY);
      ctx.stroke();
    }
  }

  function drawGun(x, y, s, angle) {
    // Pössykkä: Alfredin veistämä puupyssy
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle || -0.3);
    ctx.fillStyle = C.woodDark;
    ctx.fillRect(-s, -s * 0.12, s * 1.3, s * 0.24);            // piippu
    ctx.fillStyle = C.wood;
    ctx.beginPath();                                            // tukki
    ctx.moveTo(s * 0.3, -s * 0.14);
    ctx.lineTo(s * 1.0, s * 0.5);
    ctx.lineTo(s * 0.72, s * 0.62);
    ctx.lineTo(s * 0.18, s * 0.14);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawHalko(hk) {
    ctx.save();
    ctx.translate(hk.x, hk.y);
    ctx.rotate(hk.rot);
    const l = 16 * unit, r = 3.5 * unit;
    ctx.fillStyle = C.woodDark;
    ctx.beginPath();
    ctx.roundRect(-l / 2, -r, l, r * 2, r);
    ctx.fill();
    ctx.fillStyle = "#c9a06a";
    ctx.beginPath();
    ctx.ellipse(-l / 2 + r * 0.8, 0, r * 0.7, r * 0.85, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawHeart(x, y, s) {
    ctx.fillStyle = C.heart;
    ctx.beginPath();
    ctx.arc(x - s * 0.35, y, s * 0.4, 0, Math.PI * 2);
    ctx.arc(x + s * 0.35, y, s * 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x - s * 0.72, y + s * 0.12);
    ctx.lineTo(x, y + s);
    ctx.lineTo(x + s * 0.72, y + s * 0.12);
    ctx.closePath();
    ctx.fill();
  }

  function drawSauna(s) {
    const h = 58 * unit;
    const y = groundY - h;
    // Hirsirakennus, savupiippu ja ovi
    ctx.fillStyle = C.sauna;
    ctx.fillRect(s.x, y, s.w, h);
    ctx.strokeStyle = "rgba(0,0,0,0.15)";
    ctx.lineWidth = 1.5 * unit;
    for (let i = 1; i < 5; i++) {
      ctx.beginPath();
      ctx.moveTo(s.x, y + (h / 5) * i);
      ctx.lineTo(s.x + s.w, y + (h / 5) * i);
      ctx.stroke();
    }
    ctx.fillStyle = C.saunaRoof;
    ctx.beginPath();
    ctx.moveTo(s.x - 8 * unit, y);
    ctx.lineTo(s.x + s.w * 0.5, y - 22 * unit);
    ctx.lineTo(s.x + s.w + 8 * unit, y);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = "#5a5a5a";
    ctx.fillRect(s.x + s.w * 0.68, y - 30 * unit, 9 * unit, 14 * unit);
    ctx.fillStyle = C.saunaRoof;
    ctx.fillRect(s.x + s.w * 0.12, y + h * 0.32, 16 * unit, h * 0.68);

    // Liina ja Aatu saunan takana (oikealla nurkalla)
    const cx = s.x + s.w + 12 * unit;
    const ch = 36 * unit;
    const cy = groundY - ch;
    const lean = s.startled ? -0.35 : 0.22 + Math.sin(s.ph) * 0.03;
    const gapX = s.startled ? 16 * unit : 5 * unit;

    // Aatu: vihreä paita, tummat housut, lätsä
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(lean);
    ctx.fillStyle = "#4a4436";
    ctx.fillRect(-4 * unit, ch * 0.55, 8 * unit, ch * 0.45);
    ctx.fillStyle = C.aatuShirt;
    ctx.fillRect(-5 * unit, ch * 0.22, 10 * unit, ch * 0.36);
    ctx.fillStyle = C.skin;
    ctx.beginPath();
    ctx.arc(0, ch * 0.1, 6 * unit, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#6a5a3a";
    ctx.beginPath();
    ctx.arc(0, ch * 0.06, 6.2 * unit, Math.PI, 0);
    ctx.fill();
    ctx.restore();

    // Liina: sininen mekko, essu ja nuttura
    ctx.save();
    ctx.translate(cx + gapX + 10 * unit, cy);
    ctx.rotate(-lean);
    ctx.fillStyle = C.liinaDress;
    ctx.beginPath();
    ctx.moveTo(0, ch * 0.2);
    ctx.lineTo(8 * unit, ch);
    ctx.lineTo(-8 * unit, ch);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = C.liinaApron;
    ctx.beginPath();
    ctx.moveTo(0, ch * 0.45);
    ctx.lineTo(5 * unit, ch);
    ctx.lineTo(-5 * unit, ch);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = C.skin;
    ctx.beginPath();
    ctx.arc(0, ch * 0.1, 6 * unit, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = C.hair;
    ctx.beginPath();
    ctx.arc(0, ch * 0.05, 6 * unit, Math.PI * 0.9, Math.PI * 2.05);
    ctx.arc(6 * unit, ch * 0.02, 3 * unit, 0, Math.PI * 2); // nuttura
    ctx.fill();
    ctx.restore();

    // Sydämet leijuu — tai säikähdyksen huudahdus
    if (!s.startled) {
      drawHeart(cx + 8 * unit, cy - 14 * unit + Math.sin(s.ph) * 3 * unit, 7 * unit);
      drawHeart(cx + 20 * unit, cy - 24 * unit + Math.cos(s.ph * 1.3) * 3 * unit, 4.5 * unit);
    } else {
      ctx.fillStyle = C.paper;
      ctx.strokeStyle = C.ink;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.roundRect(cx - 4 * unit, cy - 34 * unit, 62 * unit, 20 * unit, 7 * unit);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = C.red;
      ctx.font = `bold ${11 * unit}px Georgia, serif`;
      ctx.textAlign = "left";
      ctx.fillText("Hupsista!", cx + 2 * unit, cy - 20 * unit);
    }
  }

  function drawIda(x, ph, tugging) {
    // Iida: pieni tyttö, vaaleat saparot ja punainen mekko
    const iw = 18 * unit, ih = 30 * unit;
    const y = groundY - ih;
    ctx.save();
    ctx.translate(x, y);

    // Jalat
    ctx.strokeStyle = C.skin;
    ctx.lineWidth = 3 * unit;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(iw * 0.4, ih * 0.7);
    ctx.lineTo(iw * 0.32, ih);
    ctx.moveTo(iw * 0.6, ih * 0.7);
    ctx.lineTo(iw * 0.68, ih);
    ctx.stroke();

    // Punainen mekko (levenee helmasta)
    ctx.fillStyle = C.idaDress;
    ctx.beginPath();
    ctx.moveTo(iw * 0.5, ih * 0.28);
    ctx.lineTo(iw * 0.92, ih * 0.75);
    ctx.lineTo(iw * 0.08, ih * 0.75);
    ctx.closePath();
    ctx.fill();

    // Kädet: vilkuttaa polulla, isän luona roikkuu kädestä
    ctx.strokeStyle = C.skin;
    ctx.lineWidth = 2.5 * unit;
    ctx.beginPath();
    if (tugging) {
      ctx.moveTo(iw * 0.4, ih * 0.4);
      ctx.lineTo(iw * -0.15, ih * 0.3);
    } else {
      const wave = Math.sin(ph) * 0.25;
      ctx.moveTo(iw * 0.6, ih * 0.4);
      ctx.lineTo(iw * 0.95, ih * (0.12 + wave * 0.3));
    }
    ctx.stroke();

    // Pää, tukka ja saparot
    ctx.fillStyle = C.skin;
    ctx.beginPath();
    ctx.arc(iw * 0.5, ih * 0.16, iw * 0.32, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = C.hair;
    ctx.beginPath();
    ctx.arc(iw * 0.48, ih * 0.11, iw * 0.32, Math.PI * 0.85, Math.PI * 1.95);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(iw * 0.12, ih * 0.2, iw * 0.14, 0, Math.PI * 2);  // saparot
    ctx.arc(iw * 0.88, ih * 0.2, iw * 0.14, 0, Math.PI * 2);
    ctx.fill();

    // Silmä ja hymy
    ctx.fillStyle = C.ink;
    ctx.beginPath();
    ctx.arc(iw * 0.6, ih * 0.16, 1.3 * unit, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = C.ink;
    ctx.lineWidth = 1 * unit;
    ctx.beginPath();
    ctx.arc(iw * 0.56, ih * 0.2, iw * 0.12, 0.2, Math.PI * 0.8);
    ctx.stroke();

    ctx.restore();
  }

  function drawEemeli() {
    const { x, y, w, h } = player;
    ctx.save();
    ctx.translate(x, y);
    if (stumbleT > 0 && Math.floor(stumbleT * 10) % 2 === 0) ctx.globalAlpha = 0.5;

    // Jalat paljain jaloin
    const swing = player.onGround ? Math.sin(player.legPhase) : 0.6;
    ctx.strokeStyle = C.skin;
    ctx.lineWidth = 4 * unit;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(w * 0.5, h * 0.66);
    ctx.lineTo(w * 0.5 + swing * w * 0.42, h);
    ctx.moveTo(w * 0.5, h * 0.66);
    ctx.lineTo(w * 0.5 - swing * w * 0.42, h);
    ctx.stroke();

    // Siniset housut ja takki
    ctx.fillStyle = C.pants;
    ctx.fillRect(w * 0.22, h * 0.5, w * 0.56, h * 0.2);
    ctx.fillStyle = C.shirt;
    ctx.fillRect(w * 0.2, h * 0.3, w * 0.6, h * 0.24);

    // Kädet heiluu
    ctx.strokeStyle = C.shirt;
    ctx.lineWidth = 4 * unit;
    ctx.beginPath();
    ctx.moveTo(w * 0.5, h * 0.36);
    ctx.lineTo(w * 0.5 - swing * w * 0.4, h * 0.52);
    ctx.moveTo(w * 0.5, h * 0.36);
    ctx.lineTo(w * 0.5 + swing * w * 0.4, h * 0.52);
    ctx.stroke();

    // Pyöreä poskipää ja pellavatukka
    ctx.fillStyle = C.skin;
    ctx.beginPath();
    ctx.arc(w * 0.52, h * 0.17, w * 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = C.hair;
    ctx.beginPath();
    ctx.arc(w * 0.48, h * 0.12, w * 0.3, Math.PI * 0.85, Math.PI * 1.95);
    ctx.fill();
    // Tukkaa otsalle
    ctx.fillRect(w * 0.62, h * 0.02, w * 0.16, h * 0.07);

    // Sininen myssy
    ctx.fillStyle = C.cap;
    ctx.beginPath();
    ctx.arc(w * 0.52, h * 0.1, w * 0.31, Math.PI * 0.95, Math.PI * 1.98);
    ctx.fill();
    ctx.fillRect(w * 0.52, h * 0.02, w * 0.46, h * 0.05); // lippa

    // Silmä ja hymy
    ctx.fillStyle = C.ink;
    ctx.beginPath();
    ctx.arc(w * 0.64, h * 0.16, 1.6 * unit, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = C.ink;
    ctx.lineWidth = 1.2 * unit;
    ctx.beginPath();
    ctx.arc(w * 0.6, h * 0.2, w * 0.12, 0.2, Math.PI * 0.8);
    ctx.stroke();

    ctx.restore();
  }

  function drawDad() {
    const dw = 30 * unit, dh = 52 * unit;
    const dx = player.x - gap - dw;
    const dy = groundY - dh;
    ctx.save();
    ctx.translate(dx, dy);

    // Jalat
    const swing = Math.sin(player.legPhase * 0.9 + 1);
    ctx.strokeStyle = C.dad;
    ctx.lineWidth = 5 * unit;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(dw * 0.5, dh * 0.62);
    ctx.lineTo(dw * 0.5 + swing * dw * 0.45, dh);
    ctx.moveTo(dw * 0.5, dh * 0.62);
    ctx.lineTo(dw * 0.5 - swing * dw * 0.45, dh);
    ctx.stroke();

    // Vartalo
    ctx.fillStyle = C.dadShirt;
    ctx.fillRect(dw * 0.15, dh * 0.28, dw * 0.7, dh * 0.38);
    ctx.fillStyle = C.dad;
    ctx.fillRect(dw * 0.15, dh * 0.5, dw * 0.7, dh * 0.16);

    // Nyrkkiä puiva käsi
    ctx.strokeStyle = C.dadShirt;
    ctx.lineWidth = 5 * unit;
    ctx.beginPath();
    ctx.moveTo(dw * 0.6, dh * 0.34);
    ctx.lineTo(dw * 1.1, dh * 0.12 + Math.sin(player.legPhase * 2) * 4 * unit);
    ctx.stroke();
    ctx.fillStyle = C.dadFace;
    ctx.beginPath();
    ctx.arc(dw * 1.15, dh * 0.12 + Math.sin(player.legPhase * 2) * 4 * unit, 4 * unit, 0, Math.PI * 2);
    ctx.fill();

    // Punakka pää, pulisongit ja hattu
    ctx.fillStyle = C.dadFace;
    ctx.beginPath();
    ctx.arc(dw * 0.5, dh * 0.16, dw * 0.32, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#6a4a2a";
    ctx.fillRect(dw * 0.16, dh * 0.12, dw * 0.12, dh * 0.12); // pulisonki
    ctx.fillStyle = C.ink;
    ctx.beginPath();
    ctx.arc(dw * 0.62, dh * 0.15, 1.6 * unit, 0, Math.PI * 2);
    ctx.fill();
    // Auki huutava suu
    const mouth = yellShow > 0 ? 0.09 : 0.04;
    ctx.fillStyle = "#5a2a1a";
    ctx.beginPath();
    ctx.ellipse(dw * 0.6, dh * 0.24, dw * 0.1, dh * mouth, 0, 0, Math.PI * 2);
    ctx.fill();
    // Hattu
    ctx.fillStyle = "#4a3a26";
    ctx.fillRect(dw * 0.12, dh * 0.0, dw * 0.76, dh * 0.05);
    ctx.fillRect(dw * 0.26, dh * -0.1, dw * 0.48, dh * 0.11);

    ctx.restore();

    // Iida viivyttämässä isää
    if (idaT > 0 && state === "run") {
      const ix = dx + dw + 4 * unit;
      drawIda(ix, 0, true);
      const bx = ix + 6 * unit, by = groundY - 44 * unit;
      ctx.fillStyle = C.paper;
      ctx.strokeStyle = C.ink;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.roundRect(bx - 8 * unit, by - 16 * unit, 66 * unit, 22 * unit, 7 * unit);
      ctx.fill();
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(bx + 2 * unit, by + 6 * unit);
      ctx.lineTo(bx + 8 * unit, by + 15 * unit);
      ctx.lineTo(bx + 13 * unit, by + 6 * unit);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = C.blue || "#3a5f8a";
      ctx.font = `bold ${11 * unit}px Georgia, serif`;
      ctx.textAlign = "left";
      ctx.fillText("Isä! Kato!", bx, by);
    }

    // Isä paheksuu saunan takana pussailua
    if (saunaT > 0 && idaT <= 0 && state === "run") {
      const bx = Math.max(dx + dw * 0.5, 10), by = dy - 30 * unit;
      ctx.fillStyle = C.paper;
      ctx.strokeStyle = C.ink;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.roundRect(bx - 8 * unit, by - 16 * unit, 70 * unit, 22 * unit, 7 * unit);
      ctx.fill();
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(bx + 2 * unit, by + 6 * unit);
      ctx.lineTo(bx + 9 * unit, by + 16 * unit);
      ctx.lineTo(bx + 14 * unit, by + 6 * unit);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = C.red;
      ctx.font = `bold ${12 * unit}px Georgia, serif`;
      ctx.textAlign = "left";
      ctx.fillText("No mutta!!", bx, by);
    }

    // Puhekupla
    if (yellShow > 0 && state === "run") {
      const bx = Math.max(dx + dw * 0.5, 10), by = dy - 34 * unit;
      ctx.fillStyle = C.paper;
      ctx.strokeStyle = C.ink;
      ctx.lineWidth = 1.5;
      const tw = 110 * unit;
      ctx.beginPath();
      ctx.roundRect(bx - 8 * unit, by - 18 * unit, tw, 26 * unit, 8 * unit);
      ctx.fill();
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(bx + 6 * unit, by + 8 * unit);
      ctx.lineTo(bx + 14 * unit, by + 20 * unit);
      ctx.lineTo(bx + 20 * unit, by + 8 * unit);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = C.red;
      ctx.font = `bold ${13 * unit}px Georgia, serif`;
      ctx.textAlign = "left";
      ctx.fillText("EEEEMEEELIII!!!", bx, by);
    }
  }

  function drawHud() {
    ctx.fillStyle = C.ink;
    ctx.textAlign = "left";
    ctx.font = `bold ${17 * unit}px Georgia, serif`;
    ctx.fillText(`Pössykät: ${guns}`, 14, H * 0.14);
    ctx.font = `${13 * unit}px Georgia, serif`;
    ctx.fillText(`Matka: ${meters} m`, 14, H * 0.14 + 20 * unit);
    ctx.fillText(`Ennätys: ${highScore} pössykkää`, 14, H * 0.14 + 38 * unit);
  }

  function drawPanel(title, lines) {
    const pw = Math.min(W * 0.88, 430);
    const ph = (72 + lines.length * 25) * unit;
    const px = (W - pw) / 2;
    const py = H * 0.26;
    ctx.fillStyle = "rgba(255,250,240,0.96)";
    ctx.strokeStyle = C.red;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.roundRect(px, py, pw, ph, 12);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = C.red;
    ctx.textAlign = "center";
    ctx.font = `bold ${21 * unit}px Georgia, serif`;
    ctx.fillText(title, W / 2, py + 33 * unit);
    ctx.fillStyle = C.ink;
    ctx.font = `${14 * unit}px Georgia, serif`;
    lines.forEach((line, i) => {
      ctx.fillText(line, W / 2, py + (58 + i * 25) * unit);
    });
  }

  function draw() {
    drawBackground();
    for (const s of saunas) drawSauna(s);
    for (const o of obstacles) drawObstacle(o);
    for (const p of pickups) {
      drawGun(p.x, p.y + Math.sin(p.bob) * 5 * unit, p.r, -0.3 + Math.sin(p.bob * 0.5) * 0.1);
    }
    for (const s of idas) drawIda(s.x, s.ph, false);
    for (const hk of halkos) drawHalko(hk);
    drawDad();
    drawEemeli();

    // Eemelin älähdys halko-osumasta
    if (autsT > 0 && state === "run") {
      const bx = player.x + player.w + 4 * unit;
      const by = player.y - 12 * unit;
      ctx.fillStyle = C.paper;
      ctx.strokeStyle = C.ink;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.roundRect(bx - 6 * unit, by - 14 * unit, 42 * unit, 20 * unit, 7 * unit);
      ctx.fill();
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(bx, by + 6 * unit);
      ctx.lineTo(bx - 5 * unit, by + 15 * unit);
      ctx.lineTo(bx + 9 * unit, by + 6 * unit);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = C.red;
      ctx.font = `bold ${12 * unit}px Georgia, serif`;
      ctx.textAlign = "left";
      ctx.fillText("Auts!", bx, by);
    }
    drawHud();

    if (state === "start") {
      drawPanel("Eemeli karkuteillä", [
        "Eemeli on taas tehnyt jäynän ja isä",
        "on kannoilla! Napauta ruutua, niin",
        "Eemeli hyppää aitojen, tonkkien ja",
        "possujen yli. Nappaa pössykät talteen",
        "— ja Iida-sisko viivyttää isää!",
        "",
        "Napauta aloittaaksesi"
      ]);
    } else if (state === "over") {
      drawPanel("Isä sai kiinni!", [
        `Eemeli joutui vajaan ja veisteli`,
        `puu-ukon numero ${ukot}.`,
        `Pössykät: ${guns} — Matka: ${meters} m`,
        `Ennätys: ${highScore} pössykkää`,
        "",
        "Napauta ja pinkaise uudelleen"
      ]);
    }
  }

  function loop(t) {
    const dt = Math.min((t - lastTime) / 1000, 0.05);
    lastTime = t;
    update(dt);
    if (state !== "run") player.legPhase += dt * 10;
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame((t) => {
    lastTime = t;
    requestAnimationFrame(loop);
  });
})();
</script>
</body>
</html>
